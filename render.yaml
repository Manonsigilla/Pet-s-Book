# Blueprint Render — Backend Pet's Book
# Docs : https://render.com/docs/blueprint-spec

services:
  - type: web
    name: pets-book-api
    runtime: node
    repo: https://github.com/Manonsigilla/Pet-s-Book
    branch: main
    rootDir: server
    buildCommand: npm install && npm run seed
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: CLIENT_ORIGIN
        value: https://TON-SITE.netlify.app   # ⚠️ À remplacer par ton URL Netlify
      - key: DB_PATH
        value: ./src/db/petsbook.sqlite
      - key: JWT_EXPIRES_IN
        value: 24h

      # --- Secrets (sync: false = à renseigner manuellement dans le dashboard Render) ---
      - key: PASSWORD_PEPPER
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_CLIENT_PASSWORD
        sync: false

      # --- Clés ETL (optionnelles — laisser vide si pas utilisées) ---
      - key: THECATAPI_KEY
        sync: false
      - key: THEDOGAPI_KEY
        sync: false
      - key: SODA_APP_TOKEN
        sync: false
